@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
.aj-root{--bg:#F5F0E6;--paper:#F3EDE1;--card:#FDFAF3;--ink:#3B322A;--muted:#8C8069;--line:#E8E0D0;--action:#E0674F;--ocre:#DDA02F;--serif:'Fraunces',Georgia,serif;--sans:'Hanken Grotesk',system-ui,-apple-system,sans-serif;--mono:'JetBrains Mono',ui-monospace,Menlo,monospace;max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;position:relative;-webkit-font-smoothing:antialiased;}
.aj-root *{box-sizing:border-box;}
/* \u26A0\uFE0F Retour au doigt \u2014 ces r\xE9glages vont ensemble. Le CSS vit dans un template string :
   AUCUN backtick ici, il fermerait la cha\xEEne.
   tap-highlight-color : sans lui le navigateur peint SON rectangle gris par-dessus
   l'animation, et le retour n'est plus celui qu'on a dessin\xE9.
   touch-action:manipulation : supprime l'attente du double-tap-zoom, le tap r\xE9pond net.
   user-select:none : sans lui, l'appui long s\xE9lectionne le libell\xE9 du bouton.
   cursor:pointer n'est PAS cosm\xE9tique sur iOS : sans lui, :active ne se d\xE9clenche pas.
   \u26A0\uFE0F L'action, elle, part au REL\xC2CHEMENT \u2014 c'est onClick qui le garantit (jamais
   onMouseDown / onTouchStart) : on doit pouvoir annuler en glissant le doigt hors du bouton. */
.aj-root button{font-family:var(--sans);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
/* \u26A0\uFE0F Ces quatre-l\xE0 n'avaient AUCUNE transition : ils claquaient, pendant que .aj-chip
   fondait sur .12s \u2014 alors qu'ils PARTAGENT la m\xEAme r\xE8gle :active. D'o\xF9 le \xAB pas toujours \xBB.
   Les autres (.aj-chip, .aj-member-dot, .aj-add-in\u2026) d\xE9clarent d\xE9j\xE0 la leur PLUS BAS ;
   ne pas la red\xE9clarer ici, la r\xE8gle du bas gagnerait (m\xEAme sp\xE9cificit\xE9, derni\xE8re servie). */
.aj-mini,.aj-cta,.aj-fab,.aj-hero{transition:transform .14s ease-out;}
/* Enfoncement INSTANTAN\xC9, retour EN FONDU. Sans le 0s, un tap bref (~60 ms) est plus court
   que la transition : l'enfoncement n'atteint jamais sa pleine valeur et le doigt part avant
   d'avoir vu quoi que ce soit. Ici :active (0-2-0) l'emporte sur la r\xE8gle de base (0-1-0)
   quel que soit l'ordre \u2014 c'est ce qui rend le proc\xE9d\xE9 s\xFBr. */
.aj-chip:active,.aj-mini:active,.aj-cta:active,.aj-fab:active,.aj-hero:active,.aj-member-dot:active,.aj-add-btn:active .aj-add-in,.aj-done-btn:active .aj-done-in,.aj-redo-btn:active .aj-redo-in{transition-duration:0s;}
.aj-header{padding:14px 22px 4px;}
.aj-main{flex:1;padding:6px 18px 96px;}
.aj-back{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:2px 0 4px;}

.aj-hero{border:1px solid var(--line);border-radius:20px;overflow:hidden;margin:4px 0 14px;background:var(--card);box-shadow:0 1px 2px rgba(59,50,42,.03),0 10px 26px rgba(59,50,42,.05);cursor:pointer;}
.aj-hero:active{transform:scale(.995);}
.aj-ciel{position:relative;height:128px;transition:background .8s ease;}
.aj-sun{position:absolute;top:16px;right:24px;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#FBEBB6,#F3C766 55%,rgba(243,199,102,0) 74%);transition:opacity .8s,transform .8s;}
.aj-cloud{position:absolute;background:#FEFCF6;border-radius:999px;height:22px;width:84px;box-shadow:18px -10px 0 5px #FEFCF6,44px -4px 0 1px #FEFCF6;transition:opacity .8s;}
.aj-cloud.c1{top:32px;left:16px;animation:aj-drift 26s ease-in-out infinite alternate;}
.aj-cloud.c2{top:74px;right:2px;transform:scale(.72);animation:aj-drift 34s ease-in-out infinite alternate-reverse;}
@keyframes aj-drift{from{margin-left:0}to{margin-left:24px}}
.aj-ciel-txt{position:absolute;left:16px;bottom:12px;display:flex;flex-direction:column;gap:2px;}
.aj-ciel-stage{font-family:var(--serif);font-weight:600;font-size:20px;letter-spacing:-.01em;color:rgba(59,50,42,.94);}
.aj-ciel-line{font-size:12px;color:rgba(59,50,42,.66);}
.aj-hero-stats{padding:13px 16px 13px;}
.aj-metrics{display:flex;gap:18px;flex-wrap:wrap;}
.aj-metric{display:flex;flex-direction:column;gap:1px;}
.aj-metric-l{font-size:11.5px;color:var(--muted);}
.aj-big{font-family:var(--serif);font-weight:600;font-size:34px;line-height:1;letter-spacing:-.02em;}
.aj-palier{margin-top:13px;}
.aj-palier-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;font-size:13.5px;font-weight:700;}
.aj-badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
.aj-bdg{font-size:11px;font-weight:700;padding:3px 9px;border-radius:9px;border:1px solid;}
.aj-hero-link{font-family:var(--mono);font-size:10.5px;color:var(--action);font-weight:500;margin-top:13px;letter-spacing:.02em;}

.aj-coach-q{font-family:var(--serif);font-weight:500;font-size:30px;line-height:1;letter-spacing:-.02em;margin:6px 3px 12px;}
.aj-prio{margin-bottom:10px;}
.aj-prio-sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 2px 10px;}

.aj-input{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:14.5px;font-family:var(--sans);color:var(--ink);outline:none;width:100%;}
.aj-input:focus{border-color:var(--ink);}
.aj-gcal{display:inline-block;margin-top:8px;padding:8px 12px;background:var(--paper);border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;color:var(--ink);text-decoration:none;}
.aj-hint-line{font-size:12px;color:var(--muted);margin:11px 2px 0;line-height:1.4;}
.aj-link{background:none;border:none;color:var(--ink);font-weight:700;text-decoration:underline;padding:0;font-size:inherit;font-family:inherit;}
.aj-form{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:6px 0 4px;box-shadow:0 1px 2px rgba(59,50,42,.03),0 10px 26px rgba(59,50,42,.05);}
.aj-form-label{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:13px 0 7px;}
.aj-form-label:first-child{margin-top:0;}
.aj-form-2col{display:flex;gap:16px;flex-wrap:wrap;}
.aj-form-2col>div{flex:1;min-width:150px;}
.aj-form-actions{display:flex;gap:10px;align-items:center;margin-top:16px;}
.aj-form-actions .aj-cta{flex:1;}
.aj-lbl-hint{font-family:var(--sans);text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted);font-weight:400;}

.aj-coachpanel{margin-top:30px;padding-top:22px;border-top:1px solid var(--line);}
.aj-ask{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 1px 2px rgba(59,50,42,.03),0 10px 26px rgba(59,50,42,.05);}
.aj-ask-label{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:2px 2px 8px;}
.aj-ask-label:not(:first-child){margin-top:16px;}
.aj-chips{display:flex;gap:8px;flex-wrap:wrap;}
.aj-chip{background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:9px 14px;font-size:14px;transition:all .12s;}
.aj-chip.sel{background:var(--ink);color:#FDFAF3;border-color:var(--ink);}
.aj-chip.small{padding:6px 12px;font-size:13px;}
.aj-chip:active,.aj-mini:active,.aj-cta:active{transform:translateY(1px);}
.aj-cta{margin-top:18px;width:100%;background:var(--ink);color:#FDFAF3;border:none;border-radius:13px;padding:14px;font-size:15px;font-weight:600;transition:opacity .12s;}
.aj-cta.off{opacity:.32;}
.aj-results{margin-top:24px;}
.aj-coach-line{font-family:var(--serif);font-size:20px;line-height:1.3;font-weight:500;margin:0 2px 16px;letter-spacing:-.01em;}
.aj-card{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:14px;padding:15px 15px 13px;margin-bottom:12px;}
.aj-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.aj-card h3{font-size:16.5px;font-weight:600;margin:0;line-height:1.25;}
.aj-dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:none;}
.aj-tags{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0 0;align-items:center;}
.aj-tag{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:8px;background:#FBF6EC;color:var(--muted);}
.aj-tag.ghost{background:transparent;border:1px solid var(--line);}
.aj-tag.urgent{background:#F7DED8;color:#B5432F;}
.aj-ess-tag{font-size:12px;color:var(--ocre);}
.aj-aside{font-size:13px;color:var(--muted);margin:11px 0 0;line-height:1.45;}
.aj-aside.soft{font-style:italic;color:#A2957C;}
.aj-sens{font-size:13px;font-style:italic;color:#8C7A54;margin:9px 0 0;line-height:1.45;}
.aj-card-actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;}
.aj-mini{background:#FBF6EC;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 14px;font-size:13.5px;font-weight:600;}
.aj-mini.solid{background:var(--ink);color:#FDFAF3;border-color:var(--ink);}
.aj-mini.ghost{color:var(--muted);background:transparent;}
.aj-mini.warm{border-color:var(--action);color:var(--action);}
.aj-mini.danger{background:#B5432F;color:#fff;border-color:#B5432F;}
.aj-lighten{border-top:1px dashed var(--line);margin-top:13px;padding-top:12px;display:flex;flex-direction:column;gap:7px;}
.aj-lighten .aj-mini{width:100%;text-align:left;}
.aj-lighten-q{font-family:var(--serif);font-size:15.5px;font-weight:600;margin:0 0 4px;}

.aj-h2{font-family:var(--serif);font-weight:600;font-size:28px;letter-spacing:-.02em;margin:8px 2px 4px;}
.aj-lede{color:var(--muted);font-size:14px;margin:0 2px 18px;line-height:1.5;}
.aj-empty{text-align:center;padding:40px 20px;color:var(--ink);}
.aj-empty p{margin:0;font-family:var(--serif);font-size:19px;}
.aj-empty-sub{margin-top:8px !important;font-family:var(--sans) !important;font-size:14px !important;color:var(--muted);line-height:1.5;}
.aj-seg{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin:10px 2px 16px;}
.aj-seg-btn{flex:1;background:none;border:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:9px;border-radius:9px;}
.aj-seg-btn.on{background:var(--ink);color:#FDFAF3;}
.aj-filter{display:flex;gap:8px;margin:2px 2px 0;}
.aj-sec{margin-bottom:18px;}
.aj-sec-head{display:flex;align-items:center;gap:8px;margin:0 2px 8px;}
.aj-sec-dot{width:8px;height:8px;border-radius:50%;}
.aj-sec-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.aj-sec-n{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;}
.aj-row{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:11px;margin-bottom:7px;overflow:hidden;}
.aj-row-main{width:100%;background:none;border:none;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;text-align:left;}
.aj-row-title{font-size:14.5px;font-weight:600;color:var(--ink);}
.aj-row.cyc .aj-row-title{font-weight:500;font-style:italic;}
.aj-row-meta{display:flex;align-items:center;gap:7px;flex:none;flex-wrap:wrap;justify-content:flex-end;max-width:56%;}
.aj-ess{font-style:normal;font-size:13px;color:var(--ocre);}
.aj-envietag{font-family:var(--mono);font-style:normal;font-size:9.5px;color:#B85C86;text-transform:uppercase;letter-spacing:.05em;border:1px solid #E7C6D6;background:#FBEDF3;border-radius:6px;padding:1px 5px;}
.aj-whodots{display:inline-flex;gap:2px;}
.aj-whodots i{width:8px;height:8px;border-radius:50%;display:block;}
.aj-rec{font-family:var(--mono);font-style:normal;font-size:9.5px;color:#5E8C6E;border:1px solid #CDDCCF;background:#EDF3EE;border-radius:6px;padding:1px 5px;}
.aj-row-min{font-family:var(--mono);font-size:11.5px;color:var(--muted);}
.aj-when{font-family:var(--mono);font-style:normal;font-size:10px;color:#8A6D3A;border:1px solid var(--line);border-radius:6px;padding:1px 5px;}
.aj-chk{font-family:var(--mono);font-style:normal;font-size:10px;color:#5E8C6E;border:1px solid #CDDCCF;background:#EDF3EE;border-radius:6px;padding:1px 5px;}
.aj-note-dot{font-style:normal;font-size:12px;color:var(--muted);}
.aj-edit{padding:0 14px 14px;border-top:1px solid var(--line);}
.aj-edit-label{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px;}
.aj-dl-row{display:flex;gap:8px;align-items:center;}
.aj-dl-input{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-family:var(--sans);font-size:13.5px;color:var(--ink);outline:none;width:100%;}
.aj-dl-input:focus{border-color:var(--ink);}
.aj-cal-note{display:block;font-size:11px;color:var(--muted);margin-top:6px;font-style:italic;}
.aj-edit-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.aj-confirm{margin-top:16px;padding:12px;border:1px solid #E3B7AB;background:#F8E7E1;border-radius:12px;}
.aj-confirm-txt{font-size:13px;color:#8A3A28;line-height:1.4;}
.aj-confirm-row{display:flex;gap:8px;margin-top:10px;}
.aj-notes{width:100%;min-height:56px;resize:vertical;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:var(--sans);font-size:13.5px;line-height:1.45;color:var(--ink);outline:none;}
.aj-notes:focus{border-color:var(--ink);}
.aj-checklist{display:flex;flex-direction:column;gap:2px;}
.aj-chk-item{display:flex;align-items:center;gap:10px;padding:5px 0;}
.aj-chk-box{width:22px;height:22px;flex:none;border:1.5px solid #C6B79A;background:var(--paper);border-radius:7px;color:#fff;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;}
.aj-chk-box.on{background:var(--ink);border-color:var(--ink);}
.aj-chk-edit{flex:1;border:none;background:transparent;border-bottom:1px solid transparent;font-family:var(--sans);font-size:14px;color:var(--ink);outline:none;padding:2px 0;min-width:0;}
.aj-chk-edit:focus{border-bottom-color:var(--line);}
.aj-chk-edit.done{color:var(--muted);text-decoration:line-through;}
.aj-chk-x{background:none;border:none;color:var(--muted);font-size:18px;line-height:1;padding:0 4px;flex:none;}
.aj-chk-add{display:flex;gap:8px;margin-top:8px;}
.aj-chk-add .aj-input{padding:8px 11px;font-size:13.5px;}
.aj-chk-add .aj-mini{flex:none;min-width:38px;}

.aj-panneaux{margin-top:26px;}
.aj-panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(59,50,42,.03),0 10px 26px rgba(59,50,42,.05);}
.aj-panel-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
.aj-panel-head h3{font-family:var(--serif);font-weight:600;font-size:17px;margin:0;letter-spacing:-.01em;}
.aj-panel-sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.aj-panel-link{background:none;border:none;color:var(--ink);font-weight:700;font-size:13px;padding:12px 0 0;text-align:left;}
.aj-hz{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.aj-hz-dot{width:8px;height:8px;border-radius:50%;flex:none;}
.aj-hz-title{font-size:14px;font-weight:500;flex:1;}
.aj-hz-w{font-family:var(--mono);font-size:11px;color:var(--muted);flex:none;}
.aj-goal2{margin-bottom:14px;}
.aj-goal2:last-of-type{margin-bottom:0;}
.aj-goal2-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;font-size:14px;font-weight:600;gap:8px;}
.aj-goal2-n{font-family:var(--mono);font-size:12.5px;color:var(--muted);font-weight:500;flex:none;}
.aj-cad{font-family:var(--mono);font-style:normal;font-size:10px;color:var(--muted);font-weight:400;}
.aj-bar-track{flex:1;height:10px;background:var(--paper);border-radius:6px;overflow:hidden;border:1px solid var(--line);}
.aj-bar-fill{height:100%;border-radius:6px;transition:width .4s ease;}

.aj-chart{display:flex;align-items:flex-end;gap:3px;height:150px;padding:8px 0 0;overflow-x:auto;flex:1;}
.aj-chartrow{display:flex;gap:8px;align-items:flex-start;}
.aj-yaxis{display:flex;flex-direction:column;justify-content:space-between;height:138px;padding-top:8px;font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right;min-width:16px;flex:none;}
.aj-bar-col{flex:1;min-width:9px;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end;}
.aj-bar-stack{width:100%;max-width:26px;display:flex;flex-direction:column-reverse;border-radius:4px 4px 0 0;overflow:hidden;min-height:2px;background:var(--paper);}
.aj-bar-stack>i{width:100%;display:block;min-height:2px;}
.aj-bar-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;}
.aj-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;}
.aj-leg{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);}
.aj-leg i{width:9px;height:9px;border-radius:3px;}
.aj-leg b{color:var(--ink);font-weight:700;font-family:var(--mono);font-size:12px;margin-left:1px;}
.aj-archrow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:11px;padding:10px 13px;margin-bottom:7px;}
.aj-arch-info{display:flex;flex-direction:column;min-width:0;}
.aj-arch-title{font-size:14px;font-weight:600;color:var(--ink);}
.aj-arch-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px;}

.aj-member{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
/* La pastille est tapable : sans anneau ni chevron, personne ne le devine. */
.aj-member-dot{width:26px;height:26px;border-radius:50%;flex:none;border:2px solid #fff;box-shadow:0 0 0 1px var(--line),0 1px 3px rgba(59,50,42,.18);padding:0;display:flex;align-items:flex-end;justify-content:center;transition:transform .12s;}
.aj-member-dot:active{transform:scale(.9);}
.aj-member-dot.open{box-shadow:0 0 0 2px var(--ink);}
.aj-member-dot-car{font-size:8px;color:#fff;line-height:1;padding-bottom:2px;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.aj-member-info{flex:1;display:flex;flex-direction:column;}
.aj-member-name{font-size:15px;font-weight:600;}
.aj-member-role{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}
.aj-member-add{display:flex;gap:8px;}
.aj-foyer-foot{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px;align-items:flex-start;}

.aj-fab{position:fixed;right:16px;bottom:78px;width:56px;height:56px;border-radius:50%;background:var(--action);color:#fff;border:none;font-size:30px;line-height:1;z-index:18;box-shadow:0 8px 22px rgba(224,103,79,.36);display:flex;align-items:center;justify-content:center;}
.aj-fab:active{transform:translateY(1px);}
.aj-modal{position:fixed;inset:0;background:rgba(43,38,32,.42);z-index:40;display:flex;align-items:flex-end;justify-content:center;}
.aj-sheet{background:var(--bg);width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:16px 18px calc(20px + env(safe-area-inset-bottom));animation:aj-sheet-up .24s ease both;}
@keyframes aj-sheet-up{from{transform:translateY(30px);opacity:.6}to{transform:translateY(0);opacity:1}}
.aj-sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.aj-sheet .aj-form{margin:6px 0 0;box-shadow:none;}
.aj-collapse{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease;}
.aj-collapse.open{grid-template-rows:1fr;}
.aj-collapse-inner{overflow:hidden;min-height:0;}
.aj-view{will-change:transform,opacity;}
.aj-slide-r{animation:aj-sr .22s ease both;}
.aj-slide-l{animation:aj-sl .22s ease both;}
@keyframes aj-sr{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
@keyframes aj-sl{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
.aj-dialwrap{display:flex;justify-content:center;padding:6px 0 4px;}
.aj-dial{width:180px;height:180px;touch-action:none;cursor:grab;-webkit-user-select:none;user-select:none;}
.aj-dial:active{cursor:grabbing;}
.aj-dial-track{stroke:#EBE1D0;}
.aj-dial-arc{stroke:var(--action);}
.aj-dial-knob{fill:var(--action);stroke:#fff;stroke-width:2.5;}
.aj-dial-tick{stroke:#CDBFA6;stroke-width:2;stroke-linecap:round;}
.aj-dial-num{font-family:var(--serif);font-weight:600;font-size:31px;fill:var(--ink);}
.aj-dial-unit{font-family:var(--mono);font-size:12px;fill:var(--muted);}
.aj-celebr{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;pointer-events:none;}
.aj-celebr-card{position:relative;background:var(--ink);color:#FDFAF3;border-radius:20px;padding:22px 30px;display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:0 18px 50px rgba(0,0,0,.3);animation:aj-cel .28s cubic-bezier(.2,1.4,.4,1) both;}
@keyframes aj-cel{from{transform:scale(.72);opacity:0}to{transform:scale(1);opacity:1}}
.aj-celebr-pts{font-family:var(--serif);font-weight:600;font-size:40px;line-height:1;letter-spacing:-.02em;}
.aj-celebr-who{font-size:15px;font-weight:600;margin-top:4px;text-align:center;}
.aj-celebr-sub{font-family:var(--mono);font-size:11px;color:rgba(253,250,243,.65);margin-top:2px;}
.aj-burst{position:absolute;top:50%;left:50%;}
.aj-burst i{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0;animation:aj-pop .85s ease-out .05s forwards;}
@keyframes aj-pop{from{transform:translate(0,0) rotate(0) scale(1);opacity:1}to{transform:translate(var(--dx),var(--dy)) rotate(140deg) scale(.4);opacity:0}}
.aj-toast{position:fixed;left:50%;transform:translateX(-50%);bottom:88px;background:var(--ink);color:#FDFAF3;padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:500;max-width:360px;text-align:center;z-index:20;box-shadow:0 6px 24px rgba(0,0,0,.16);}
.aj-session{position:fixed;left:50%;transform:translateX(-50%);bottom:72px;width:min(414px,calc(100% - 20px));background:var(--ink);color:#FDFAF3;border-radius:16px;padding:10px 13px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;z-index:15;box-shadow:0 10px 30px rgba(0,0,0,.22);}
.aj-session .aj-mini{background:transparent;border-color:rgba(253,250,243,.4);color:#FDFAF3;}
.aj-session .aj-mini.solid{background:#FDFAF3;color:var(--ink);border-color:#FDFAF3;}
.aj-sess-time{font-family:var(--mono);font-size:17px;font-weight:600;}
.aj-sess-title{flex:1;font-size:13px;min-width:110px;line-height:1.35;}
.aj-redo-btn{flex:none;width:40px;height:40px;margin-right:4px;padding:0;background:none;border:none;display:flex;align-items:center;justify-content:center;}
.aj-redo-in{width:26px;height:26px;border:1.5px solid #C6BCA6;border-radius:50%;background:rgba(255,255,255,.5);color:var(--ocre);font-size:15px;font-weight:600;line-height:1;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.aj-redo-btn:active .aj-redo-in{transform:scale(.86);}
.aj-emo{margin-right:6px;font-size:.95em;}
.aj-pin{position:absolute;top:8px;right:8px;width:32px;height:32px;padding:0;background:none;border:none;font-size:15px;line-height:1;opacity:.28;filter:grayscale(1);transition:opacity .15s,filter .15s;}
.aj-pin.on{opacity:1;filter:none;}
.aj-colorpick{display:flex;flex-wrap:wrap;gap:6px;padding:2px 0 12px 34px;}
.aj-color-opt{width:30px;height:30px;border-radius:50%;border:2px solid transparent;padding:0;}
.aj-color-opt.sel{border-color:var(--ink);box-shadow:0 0 0 2px var(--bg) inset;}
.aj-color-opt.auto.sel{border:2px solid var(--ink);}
.aj-color-opt.auto{background:var(--paper);border:1px dashed #C6BCA6;font-size:8.5px;font-family:var(--mono);color:var(--muted);width:auto;padding:0 9px;border-radius:15px;}
.aj-pgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.aj-pcard{position:relative;display:flex;flex-direction:column;padding:11px 11px 10px;border-radius:13px;border-left-width:3px;border-left-style:solid;}
.aj-pcard-main{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;}
.aj-pcard-emo{font-size:27px;line-height:1.1;}
.aj-pcard h3{font-family:var(--serif);font-size:14.5px;font-weight:600;line-height:1.25;margin:0;}
.aj-pcard .aj-tags{justify-content:center;gap:4px;margin:1px 0 9px;}
.aj-pcard-actions{display:flex;flex-direction:column;gap:5px;}
.aj-pcard-row2{display:flex;gap:5px;}
.aj-pcard-row2 .aj-mini{flex:1;padding:7px 4px;font-size:11.5px;}
.aj-mini.wide{width:100%;padding:8px 4px;}
.aj-rappel-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.aj-rappel-kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--action);margin:0;}
.aj-emowrap{margin-bottom:2px;}
.aj-emo-cur{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:7px 11px;font-size:19px;line-height:1;}
.aj-emo-cur-v{min-width:22px;text-align:center;}
.aj-emopick{display:flex;flex-wrap:wrap;gap:5px;padding-top:7px;}
.aj-emo-opt{width:36px;height:36px;border:1px solid var(--line);border-radius:9px;background:var(--paper);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;}
.aj-emo-opt.none{color:var(--muted);font-size:14px;}
.aj-emo-opt.sel{border-color:var(--ink);background:#fff;box-shadow:0 0 0 1px var(--ink) inset;}
.aj-libwrap{position:relative;}
.aj-tuto{background:var(--ink);color:#FBF7EE;border-radius:13px;padding:13px 14px 11px;box-shadow:0 10px 30px rgba(59,50,42,.28);animation:tutoIn .28s ease-out;}
.aj-tuto.anchor-lib{position:absolute;top:100%;left:0;right:0;margin-top:9px;z-index:19;}
.aj-tuto.anchor-fab{position:fixed;right:16px;bottom:142px;width:min(272px,calc(100vw - 32px));z-index:19;}
.aj-tuto-txt{margin:0 0 10px;font-size:13.5px;line-height:1.45;}
.aj-tuto-txt b{color:var(--ocre);}
.aj-tuto-row{display:flex;gap:8px;justify-content:flex-end;}
.aj-tuto-row .aj-mini.solid{background:#FBF7EE;color:var(--ink);border-color:#FBF7EE;}
.aj-tuto-row .aj-mini.ghost{color:#C9BFAE;border-color:#5B5044;}
.aj-tuto-arrow{position:absolute;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;}
.aj-tuto-arrow.up{top:-7px;left:26px;border-bottom:8px solid var(--ink);}
.aj-tuto-arrow.down{bottom:-7px;right:22px;border-top:8px solid var(--ink);}
@keyframes tutoIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.aj-tuto{animation:none;}}
.aj-row.leaving,.aj-pcard.leaving{transition:opacity .19s ease-out;opacity:0;pointer-events:none;}
@media (prefers-reduced-motion:reduce){.aj-row.leaving,.aj-pcard.leaving{transition:none;}}
.aj-h2-count{font-family:var(--mono);font-size:13px;font-weight:400;color:var(--muted);vertical-align:middle;margin-left:2px;}
.aj-libtoggle{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px;margin:12px 0 2px;font-family:var(--sans);font-size:14px;font-weight:600;color:var(--ink);}
.aj-libtoggle .aj-expand-car{font-size:9px;color:var(--muted);}
.aj-lib{padding-top:8px;}
/* Pas encore \xE0 moi : fond neutre, liser\xE9 pointill\xE9 \u2014 la couleur de la personne
   est r\xE9serv\xE9e \xE0 ce qui est r\xE9ellement dans la liste. */
.aj-row.lib{background:var(--card);border-left:3px dashed #D8CFBB;}
.aj-row.lib .aj-row-title{font-weight:600;}
.aj-add-btn{flex:none;width:44px;height:44px;margin-left:3px;padding:0;background:none;border:none;display:flex;align-items:center;justify-content:center;}
.aj-add-in{width:30px;height:30px;border:2px solid var(--ocre);border-radius:50%;background:rgba(255,255,255,.62);color:var(--ocre);font-size:17px;font-weight:600;line-height:1;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.aj-add-btn:active .aj-add-in{transform:scale(.86);}
.aj-search{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:0 11px;margin:10px 0 2px;}
.aj-search:focus-within{border-color:var(--ink);}
.aj-search-ico{color:var(--muted);font-size:17px;line-height:1;flex:none;}
.aj-search-in{flex:1;min-width:0;background:none;border:none;outline:none;font-family:var(--sans);font-size:14.5px;color:var(--ink);padding:11px 0;}
.aj-search-in::placeholder{color:var(--muted);}
.aj-search-in::-webkit-search-cancel-button{-webkit-appearance:none;display:none;}
.aj-search-x{flex:none;width:34px;height:34px;margin-right:-8px;background:none;border:none;color:var(--muted);font-size:21px;line-height:1;display:flex;align-items:center;justify-content:center;}
.aj-dob{position:relative;display:flex;align-items:center;}
.aj-dob-text{flex:1;padding-right:44px;}
.aj-dob-cal{position:absolute;right:0;top:0;bottom:0;width:42px;background:none;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.75;}
.aj-dob-cal:active{opacity:1;}
/* input date r\xE9el : invisible mais focusable, sert de s\xE9lecteur quand on clique l'ic\xF4ne.
   width/height \xE0 0 mais pr\xE9sent dans le DOM pour que showPicker() fonctionne. */
.aj-dob-native{position:absolute;right:8px;bottom:2px;width:1px;height:1px;opacity:0;pointer-events:none;border:none;padding:0;}
.aj-row-band{display:flex;align-items:center;}
.aj-pin-slim{flex:none;background:none;border:none;padding:0 4px;font-size:15px;filter:grayscale(1) opacity(0.35);cursor:pointer;}
.aj-pin-slim.on{filter:none;}
.aj-row-band .aj-row-main{padding-left:6px;}
.aj-done-btn{flex:none;width:44px;height:44px;margin-left:3px;padding:0;background:none;border:none;display:flex;align-items:center;justify-content:center;}
.aj-done-in{width:30px;height:30px;border:2px solid;border-radius:50%;font-size:14px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;transition:transform .12s;}
.aj-done-btn:active .aj-done-in{transform:scale(.86);}
.aj-row.slim .aj-row-main{padding:10px 12px 10px 6px;}
.aj-row.slim .aj-row-title{font-size:13.5px;}
.aj-pcard.rest h3{color:var(--muted);font-weight:500;}
.aj-pcard.rest .aj-pcard-emo,.aj-pcard.rest .aj-whotags{opacity:.6;}
.aj-row.rest .aj-row-title{color:var(--muted);font-weight:500;}

.aj-timer-digits.dim{color:var(--muted);}
.aj-timer-state{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.aj-timer-overtxt{font-family:var(--serif);font-size:27px;font-weight:600;}

.aj-tab{flex:1;background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:9px 4px;border-radius:10px;position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;}
.aj-tab.on{color:var(--ink);}
.aj-tab.on::after{content:'';position:absolute;bottom:2px;width:5px;height:5px;border-radius:50%;background:var(--ink);}
.aj-badge{font-family:var(--mono);font-style:normal;font-size:10px;background:var(--action);color:#fff;border-radius:9px;padding:1px 6px;position:absolute;top:2px;right:calc(50% - 28px);}

.aj-info-bubble{position:absolute;left:0;top:22px;z-index:50;width:230px;max-width:72vw;background:var(--ink);color:#FDFAF3;font-family:var(--sans);font-size:12px;font-weight:400;line-height:1.45;text-transform:none;letter-spacing:0;padding:10px 12px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.24);white-space:normal;}
.aj-save-block{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 14px;margin:2px 0 4px;}

.aj-save-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.aj-import-lbl{display:inline-flex;align-items:center;cursor:pointer;}
.aj-import-lbl input{display:none;}
@media (prefers-reduced-motion:reduce){.aj-root *{transition:none !important;animation:none !important;}}
